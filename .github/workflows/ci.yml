name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Quality gate
        run: make check

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install ".[dev]"

      - name: Validate supported Python and static wheel
        run: python -m pytest -q tests/test_contracts.py tests/test_packaging.py


  install-channels:
    name: Install channels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install packaging tools
        run: python -m pip install pipx pytest setuptools==83.0.0

      - name: Validate synthetic platform contracts
        run: python -m pytest -q tests/test_platform_support.py

      - name: Build wheel artifact
        run: python -m pip wheel . --no-deps --no-build-isolation --wheel-dir dist

      - name: Validate pip, pipx, and uv tool lifecycle
        run: python scripts/verify_install_channels.py dist

  release-gate:
    name: Release gate
    if: ${{ always() }}
    needs: [checks, compatibility, install-channels]
    runs-on: ubuntu-latest
    steps:
      - name: Require every release-path check
        env:
          CHECKS: ${{ needs.checks.result }}
          COMPATIBILITY: ${{ needs.compatibility.result }}
          INSTALL_CHANNELS: ${{ needs.install-channels.result }}
        run: |
          test "$CHECKS" = success
          test "$COMPATIBILITY" = success
          test "$INSTALL_CHANNELS" = success

  merged-wheel:
    name: Merged wheel artifact
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [release-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install packaging tools
        run: python -m pip install build

      - name: Read and validate artifact version
        id: version
        shell: bash
        run: |
          version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          test -n "$version"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build merged wheel
        run: python -m build --wheel --outdir artifacts

      - name: Validate the exact merged wheel
        run: python scripts/verify_install_channels.py artifacts --channel pip

      - name: Write checksum and provenance
        env:
          VERSION: ${{ steps.version.outputs.value }}
        shell: bash
        run: |
          cd artifacts
          sha256sum aiplane-*.whl > SHA256SUMS
          sha256sum --check SHA256SUMS
          printf '{"version":"%s","commit":"%s","ref":"%s","workflow_run_id":"%s"}\n' \
            "$VERSION" "$GITHUB_SHA" "$GITHUB_REF" "$GITHUB_RUN_ID" > provenance.json

      - name: Upload versioned merged-wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: aiplane-wheel-v${{ steps.version.outputs.value }}-${{ github.sha }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
