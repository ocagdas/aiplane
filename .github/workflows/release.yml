name: Release artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install build and validation tools
        run: python -m pip install build pipx setuptools==83.0.0

      - name: Require tag to match package version
        run: python -c 'import os, tomllib, pathlib; version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]; tag = os.environ["GITHUB_REF_NAME"]; assert tag == f"v{version}", f"tag {tag} does not match package version {version}"'

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate wheel through every install channel
        run: python scripts/verify_install_channels.py dist

      - name: Publish GitHub Release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
