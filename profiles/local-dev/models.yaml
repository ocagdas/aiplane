defaults:
  self_managed_model: qwen-tiny
  chat_model: llama-8b
  autocomplete_model: qwen-coder-1.5b-base
  embedding_model: nomic-embed-text
  code_model: qwen-small
  completion_model: qwen-small
  reasoning_model: deepseek-r1-1.5b
providers:
  ollama:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: ollama
    protocol: ollama_api
    endpoint: 'http://localhost:11434'
    enabled: true
    timeout_seconds: 60
  vllm:
    ownership: self_managed
    access:
      kind: same_host
    substrate: docker
    runtime: vllm
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8000/v1'
    notes: OpenAI-compatible vLLM server; access may be same-host, SSH tunnel, LAN, or Kubernetes ingress depending on deployment.
  lmstudio:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: lmstudio
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:1234/v1'
    notes: LM Studio local server using an OpenAI-compatible endpoint.
  llamacpp:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: llamacpp
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8080/v1'
    notes: llama.cpp server using an OpenAI-compatible endpoint.
  tgi:
    ownership: self_managed
    access:
      kind: same_host
    substrate: docker
    runtime: tgi
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8081/v1'
    notes: Hugging Face Text Generation Inference server; commonly deployed in containers on GPU hosts.
  transformers:
    ownership: self_managed
    access:
      kind: library
    substrate: venv
    runtime: transformers
    protocol: python_library
    enabled: false
    notes: Hugging Face Transformers Python library for experiments, training, fine-tuning, and direct scripts; not an HTTP runtime by default.
  localai:
    ownership: self_managed
    access:
      kind: same_host
    substrate: docker
    runtime: localai
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8082/v1'
    notes: LocalAI OpenAI-compatible server for multiple backends including GGUF/llama.cpp-style models.
  piper:
    ownership: self_managed
    access:
      kind: native_cli
    substrate: native
    runtime: piper
    protocol: native_cli
    enabled: false
    notes: Piper text-to-speech runtime; install/runtime management is planned.
  comfyui:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: comfyui
    protocol: local_api
    enabled: false
    endpoint: 'http://localhost:8188'
    notes: ComfyUI image/video workflow runtime; GUI/API runtime management is planned.
  faster_whisper:
    ownership: self_managed
    access:
      kind: library
    substrate: venv
    runtime: faster_whisper
    protocol: python_library
    enabled: false
    notes: faster-whisper speech-to-text Python runtime; install/runtime management is planned.
  diffusers:
    ownership: self_managed
    access:
      kind: library
    substrate: venv
    runtime: diffusers
    protocol: python_library
    enabled: false
    notes: Hugging Face Diffusers Python runtime for image/video/audio pipelines.
  openai:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: openai
    protocol: openai_compatible
    endpoint: 'https://api.openai.com/v1'
    api_key_env: OPENAI_API_KEY
    enabled: false
    notes: Enable after setting OPENAI_API_KEY and choosing approved model aliases.
  anthropic:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: anthropic
    protocol: anthropic_api
    endpoint: 'https://api.anthropic.com'
    api_key_env: ANTHROPIC_API_KEY
    enabled: false
    notes: Enable after setting ANTHROPIC_API_KEY; direct Anthropic exports are target-tool specific.
  azure_openai:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: azure
    runtime: azure_openai
    protocol: azure_openai
    endpoint: ''
    api_version: '2024-02-01'
    api_key_env: AZURE_OPENAI_API_KEY
    enabled: false
    notes: Set endpoint to your Azure OpenAI resource URL, for example https://NAME.openai.azure.com, and use deployment names as model ids.
  ollama_cloud:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: ollama_cloud
    protocol: ollama_api
    endpoint: 'https://ollama.com'
    api_key_env: OLLAMA_API_KEY
    enabled: false
    notes: Hosted Ollama-style endpoint; enable only when configured for your account.
models:
  qwen-tiny:
    provider: ollama
    model: 'qwen2.5-coder:0.5b'
    roles: [analysis, completion, autocomplete, generation]
    local: true
    enabled: true
    size: 398MB
    context: 32K
    pull_command: 'ollama pull qwen2.5-coder:0.5b'
    min_ram_gb: 4
    recommended_ram_gb: 8
    min_vram_gb: 0
  qwen-small:
    provider: ollama
    model: 'qwen2.5-coder:1.5b'
    roles: [analysis, completion, autocomplete, generation]
    local: true
    enabled: true
    size: 986MB
    context: 32K
    pull_command: 'ollama pull qwen2.5-coder:1.5b'
    min_ram_gb: 8
    recommended_ram_gb: 16
    min_vram_gb: 0
  qwen-coder-1.5b-base:
    provider: ollama
    model: 'qwen2.5-coder:1.5b-base'
    roles: [completion, autocomplete]
    local: true
    enabled: true
    notes: Base coding model suited to autocomplete/completion more than chat/instruction following
    pull_command: 'ollama pull qwen2.5-coder:1.5b-base'
    min_ram_gb: 8
    recommended_ram_gb: 16
    min_vram_gb: 0
    capability_scores:
      code_analysis: 2
      code_generation: 2
      code_completion: 4
      debugging_refactor: 1
      reasoning: 1
      math: 1
      tool_use: 1
      general_chat: 1
      embedding: 0
      vision_image_understanding: 0
      image_generation: 0
      audio: 0
      video: 0
    capability_score_source: catalog_entry
  starcoder-small:
