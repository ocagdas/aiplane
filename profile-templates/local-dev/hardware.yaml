machine_schema:
  machine_tag: human-readable stock or custom machine label
  provider: local, onprem, azure, aws, gcp, other
  stock_sku: vendor SKU or instance type, such as Standard_NC40ads_H100_v5 or RTX_4090_workstation
  placement: same_host, workstation, vm, container, kubernetes, managed_api
  substrate: native, venv, conda, docker, compose, kubernetes, vm
  cpu_architecture: x86_64, arm64, or auto
  cpu_cores: physical or allocated CPU cores
  cpu_threads: hardware or allocated CPU threads
  memory_gb: system RAM available to the runtime
  memory_bandwidth_gbps: optional memory bandwidth when known
  gpu_vendor: nvidia, amd, apple, intel, none, or mixed
  gpu_model: GPU model name or auto
  gpu_count: visible or allocated GPU count
  gpu_indices: optional list of physical GPU indices to use
  vram_gb: per-runtime usable discrete GPU VRAM; use max single GPU unless model parallelism is configured
  total_vram_gb: total visible VRAM across GPUs
  unified_memory_gb: unified CPU/GPU memory pool when applicable
  accelerator_apis: cuda, rocm, metal, vulkan, openvino, cpu
  os: linux, windows, macos, or auto
  notes: free-form operator notes
