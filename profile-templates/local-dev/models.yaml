defaults:
providers:
  ollama:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: ollama
    protocol: ollama_api
    endpoint: 'http://localhost:11434'
    enabled: true
    timeout_seconds: 60
  vllm:
    ownership: self_managed
    access:
      kind: same_host
    substrate: docker
    runtime: vllm
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8000/v1'
    notes: OpenAI-compatible vLLM server; access may be same-host, SSH tunnel, LAN, or Kubernetes ingress depending on deployment.
  lmstudio:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: lmstudio
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:1234/v1'
    notes: LM Studio local server using an OpenAI-compatible endpoint.
  llamacpp:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: llamacpp
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8080/v1'
    notes: llama.cpp server using an OpenAI-compatible endpoint.
  tgi:
    ownership: self_managed
    access:
      kind: same_host
    substrate: docker
    runtime: tgi
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8081/v1'
    notes: Hugging Face Text Generation Inference server; commonly deployed in containers on GPU hosts.
  transformers:
    ownership: self_managed
    access:
      kind: library
    substrate: venv
    runtime: transformers
    protocol: python_library
    enabled: false
    notes: Hugging Face Transformers Python library for experiments, training, fine-tuning, and direct scripts; not an HTTP runtime by default.
  localai:
    ownership: self_managed
    access:
      kind: same_host
    substrate: docker
    runtime: localai
    protocol: openai_compatible
    enabled: false
    endpoint: 'http://localhost:8082/v1'
    notes: LocalAI OpenAI-compatible server for multiple backends including GGUF/llama.cpp-style models.
  comfyui:
    ownership: self_managed
    access:
      kind: same_host
    substrate: native
    runtime: comfyui
    protocol: local_api
    enabled: false
    endpoint: 'http://localhost:8188'
    notes: ComfyUI image/video workflow runtime; GUI/API runtime management is planned.
  faster_whisper:
    ownership: self_managed
    access:
      kind: library
    substrate: venv
    runtime: faster_whisper
    protocol: python_library
    enabled: false
    notes: faster-whisper speech-to-text Python runtime; install/runtime management is planned.
  diffusers:
    ownership: self_managed
    access:
      kind: library
    substrate: venv
    runtime: diffusers
    protocol: python_library
    enabled: false
    notes: Hugging Face Diffusers Python runtime for image/video/audio pipelines.
  openai:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: openai
    protocol: openai_compatible
    endpoint: 'https://api.openai.com/v1'
    api_key_env: OPENAI_API_KEY
    enabled: false
    notes: Enable after setting OPENAI_API_KEY and choosing approved model aliases.
  anthropic:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: anthropic
    protocol: anthropic_api
    endpoint: 'https://api.anthropic.com'
    api_key_env: ANTHROPIC_API_KEY
    enabled: false
    notes: Enable after setting ANTHROPIC_API_KEY; direct Anthropic exports are target-tool specific.
  azure_openai:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: azure
    runtime: azure_openai
    protocol: azure_openai
    endpoint: ''
    api_version: '2024-02-01'
    api_key_env: AZURE_OPENAI_API_KEY
    enabled: false
    notes: 'Set endpoint to your Azure OpenAI resource URL, for example https://NAME.openai.azure.com, and use deployment names as model ids.'
  ollama_cloud:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: ollama_cloud
    protocol: ollama_api
    endpoint: 'https://ollama.com'
    api_key_env: OLLAMA_API_KEY
    enabled: false
    notes: Hosted Ollama-style endpoint; enable only when configured for your account.
  azure_speech:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: azure
    runtime: azure_speech
    protocol: azure_speech
    endpoint: ''
    api_key_env: AZURE_SPEECH_KEY
    region_env: AZURE_SPEECH_REGION
    enabled: false
    notes: Azure AI Speech text-to-speech service. Configure env vars or a credential reference before use; aiplane tracks the selected TTS model but does not synthesize audio yet.
  elevenlabs:
    ownership: managed_service
    access:
      kind: hosted_api
    substrate: managed_service
    runtime: elevenlabs
    protocol: elevenlabs_tts
    endpoint: 'https://api.elevenlabs.io/v1'
    api_key_env: ELEVENLABS_API_KEY
    enabled: false
    notes: ElevenLabs hosted text-to-speech service. Configure ELEVENLABS_API_KEY or a credential reference before use; aiplane tracks selected voices/models but does not synthesize audio yet.
models:
