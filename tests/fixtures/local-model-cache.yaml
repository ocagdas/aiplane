defaults:
  self_managed_model: local-analysis-small
  chat_model: local-chat-small
  autocomplete_model: local-code-base
  embedding_model: local-embedding-small
  code_model: local-code-small
  completion_model: local-code-small
  reasoning_model: local-reasoning-small
models:
  local-analysis-small:
    provider: ollama
    model: 'provider-text-small:0.5b'
    roles: [analysis, completion, autocomplete, generation]
    local: true
    enabled: true
    size: 398MB
    context: 32K
    pull_command: 'ollama pull provider-text-small:0.5b'
    min_ram_gb: 4
    recommended_ram_gb: 8
    min_vram_gb: 0
  local-code-small:
    provider: ollama
    model: 'provider-code-small:1.5b'
    roles: [analysis, completion, autocomplete, generation]
    local: true
    enabled: true
    size: 986MB
    context: 32K
    pull_command: 'ollama pull provider-code-small:1.5b'
    min_ram_gb: 8
    recommended_ram_gb: 16
    min_vram_gb: 0
  local-code-base:
    provider: ollama
    model: 'provider-code-base:1.5b'
    roles: [completion, autocomplete]
    local: true
    enabled: true
    notes: Base coding model suited to autocomplete/completion more than chat/instruction following
    pull_command: 'ollama pull provider-code-base:1.5b'
    min_ram_gb: 8
    recommended_ram_gb: 16
    min_vram_gb: 0
    capability_scores:
      code_analysis: 2
      code_generation: 2
      code_completion: 4
      debugging_refactor: 1
      reasoning: 1
      math: 1
      tool_use: 1
      general_chat: 1
      embedding: 0
      vision_image_understanding: 0
      image_generation: 0
      audio: 0
      video: 0
    capability_score_source: catalog_entry
  local-code-alt-small:
    provider: ollama
    model: 'provider-code-alt-small:3b'
    roles: [analysis, completion, autocomplete, generation]
    local: true
    enabled: true
    size: 1.7GB
    context: 16K
    pull_command: 'ollama pull provider-code-alt-small:3b'
    min_ram_gb: 12
    recommended_ram_gb: 24
    min_vram_gb: 0
  local-general-small:
    provider: ollama
    model: 'provider-general-small:3b'
    roles: [analysis, generation]
    local: true
    enabled: false
    notes: general-purpose local model candidate; enable only after confirming runtime availability
    pull_command: 'ollama pull provider-general-small:3b'
    min_ram_gb: 12
    recommended_ram_gb: 24
    min_vram_gb: 0
  local-code-small-plus:
