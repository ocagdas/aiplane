    min_ram_gb: 12
    recommended_ram_gb: 24
    min_vram_gb: 0
    recommended_vram_gb: 4
  local-code-gpu:
    provider: ollama
    model: 'provider-code-gpu:7b'
    roles: [analysis, completion, generation]
    local: true
    enabled: false
    notes: Better local coding baseline for GPU laptops/workstations; enable after pull and fit check
    pull_command: 'ollama pull provider-code-gpu:7b'
    min_ram_gb: 16
    recommended_ram_gb: 32
    min_vram_gb: 6
    recommended_vram_gb: 8
