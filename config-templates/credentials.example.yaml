# Example only. Copy to .aiplane/credentials.yaml or another ignored path.
# Do not commit real secrets. Prefer api_key_env when target tools need env vars.
providers:
  openai:
    accounts:
      personal:
        api_key_env: OPENAI_PERSONAL_API_KEY
        endpoint: https://api.openai.com/v1
      business_a:
        api_key_env: OPENAI_BUSINESS_A_API_KEY
        endpoint: https://api.openai.com/v1
  anthropic:
    accounts:
      personal:
        api_key_env: ANTHROPIC_PERSONAL_API_KEY
        endpoint: https://api.anthropic.com
  custom_openai_compatible:
    accounts:
      lab_gateway:
        api_key_env: AIPLANE_LAB_LLM_KEY
        endpoint: https://llm-gateway.example.com/v1
